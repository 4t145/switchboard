[info]
name = "My Controller"
description = "This is my controller"

[kernel.discovery]
local = "./tmp/run/kernel/"

[interface.http]
bind = "[::]:8056"
web_root = "ui/contoller-web/build"

[file_browser]
allowed_roots = ["./examples/config"]

[resolve.fs]
path = "./examples/config/config.toml"

[resource.gateway.k8s]
gateway_namespace = "default"

[storage]
type = "local"
db_file = "./tmp/data/controller_storage.db"
