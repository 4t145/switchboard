apiVersion: apps/v1
kind: Deployment
metadata:
  name: switchboard-all-in-one
  labels:
    app.kubernetes.io/name: switchboard-all-in-one
    app.kubernetes.io/component: platform
    app.kubernetes.io/part-of: switchboard.rs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: switchboard-all-in-one
      switchboard.rs/discovery: enabled
  template:
    metadata:
      labels:
        app.kubernetes.io/name: switchboard-all-in-one
        app.kubernetes.io/component: platform
        app.kubernetes.io/part-of: switchboard.rs
        switchboard.rs/discovery: enabled
    spec:
      containers:
        - name: switchboard
          image: ghcr.io/<org>/switchboard/all-in-one:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SBK_CONFIG_PATH
              value: /etc/switchboard/kernel.toml
            - name: SBC_CONFIG_PATH
              value: /etc/switchboard/controller.toml
          ports:
            - name: grpc
              containerPort: 8055
            - name: http
              containerPort: 8056
          volumeMounts:
            - name: sbk-config
              mountPath: /etc/switchboard/kernel.toml
              subPath: kernel.toml
            - name: sbc-config
              mountPath: /etc/switchboard/controller.toml
              subPath: controller.toml
            - name: runtime
              mountPath: /var/run/switchboard/kernel
            - name: data
              mountPath: /var/lib/switchboard
          readinessProbe:
            httpGet:
              path: /api/state/current_config
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: sbk-config
          configMap:
            name: sbk-config
        - name: sbc-config
          configMap:
            name: sbc-config
        - name: runtime
          emptyDir: {}
        - name: data
          emptyDir: {}
